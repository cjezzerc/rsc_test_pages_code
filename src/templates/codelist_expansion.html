<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSC Codelist {{ codelist.id }} Expansion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4 mb-5">
        <p class="mb-2"><a href="{{ rel_path_to_phenotypes_index }}">Back to Phenotype Index</a></p>
        <p><a href="{{ rel_path_to_codelists_index }}">Back to Codelist Index</a></p>

        <h1 class="mt-4 mb-2">RSC Codelist: {{ codelist.id }}</h1>
        <h2 class="h5 text-muted mb-3">Title: {{ codelist.title }}</h2>

        <p class="mb-1"><a href="{{ rel_path_to_description }}">Codelist Description</a></p>
        <p><a href="{{ rel_path_to_logical_definition }}">Codelist Logical Definition</a></p>

        <h3 class="mt-4">Expansion</h3>

        <table class="table table-striped table-bordered table-sm">
            <thead>
                <tr>
                    <th>SNOMED ID</th>
                    <th>Term</th>
                </tr>
            </thead>
            <tbody>
                {%- for item in expansion_sorted %}
                <tr>
                    <td><a href="https://termbrowser.nhs.uk/?perspective=full&conceptId1={{ item["concept_id"] }}&edition=uk-edition&server=https://termbrowser.nhs.uk/sct-browser-api/snomed&langRefset=999001261000000100,999000691000001104">{{ item["concept_id"] }}</a></td>
                    <td>{{ item["term"] }}</td>
                </tr>
                {%- endfor %}
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
