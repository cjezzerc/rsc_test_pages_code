<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSC Codelist {{ codelist.id }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4 mb-5">
        <p class="mb-2"><a href="{{ rel_path_to_phenotypes_index }}">Back to Phenotype Index</a></p>
        <p><a href="{{ rel_path_to_codelists_index }}">Back to Codelist Index</a></p>

        <h1 class="mt-4 mb-3">RSC Codelist: {{ codelist.id }}</h1>

        <p class="mb-1"><a href="{{ rel_path_to_logical_definition }}">Codelist Logical Definition</a></p>
        <p><a href="{{ rel_path_to_expansion }}">Codelist Expansion</a></p>

        <div class="card mt-3">
            <div class="card-body">
                {%- for line in modified_description %}
                <p>{{ line }}</p>
                {%- endfor %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
