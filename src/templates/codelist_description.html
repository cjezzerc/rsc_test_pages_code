{% extends "base.html" %}

{% block title %}RSC Codelist {{ codelist.id }}{% endblock %}

{% block content %}
    <div class="container mt-4 mb-5">
        <div class="d-flex align-items-center justify-content-between mt-4 mb-3">
            <h1 class="mb-0">RSC Codelist: {{ codelist.id }}</h1>
            <a href="{{ rel_path_to_help_codelists }}" class="btn btn-sm btn-outline-secondary ms-2">Codelists Help</a>
        </div>
        <p class="mb-1"><a href="{{ rel_path_to_logical_definition }}">Codelist Logical Definition</a></p>
        <p><a href="{{ rel_path_to_expansion }}">Codelist Expansion</a></p>
        <div class="card mt-3">
            <div class="card-body">
                {{ rendered_description_html | safe }}
            </div>
        </div>
    </div>
{% endblock %}
